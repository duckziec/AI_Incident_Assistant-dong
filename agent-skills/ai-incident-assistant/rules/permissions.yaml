version: "1.0"
source: "SRS_AI_Incident_Assistant_v1.0"
timezone: "Asia/Ho_Chi_Minh"

principles:
  least_privilege: true
  deny_by_default: true
  audit_side_effects: true
  same_language_response: true
  max_group_response_lines: 5

roles:
  customer:
    description: "Customer in Telegram/Zalo support group."
  support_staff:
    description: "Support staff member who responds to customers and handles initial incidents."
  engineer:
    description: "Technical engineer who investigates and fixes incidents."
  team_lead:
    description: "Operational owner who approves resource coordination and receives escalations."
  manager:
    description: "Manager who monitors SLA, reports, and resource coordination."
  admin:
    description: "System administrator who can view and change product configuration."
  aia_bot:
    description: "System actor that performs automated intake, triage, Jira sync, SLA monitoring, and notifications."
  jira_system:
    description: "External Jira system actor that emits issue status updates."

contexts:
  group_chat:
    description: "Telegram/Zalo support group."
  direct_message:
    description: "One-to-one bot message."
  admin_console:
    description: "Privileged configuration surface."
  system_webhook:
    description: "Trusted inbound webhook after signature validation."

commands:
  - name: "/bug"
    aliases: ["/incident"]
    description: "Create or update incident from a bug description."
    allowed_roles: [customer, support_staff, engineer, team_lead, manager, admin]
    allowed_contexts: [group_chat, direct_message]
    effect: "incident_intake"
    requires_confirmation: false
    audit: true

  - name: "/report"
    description: "If followed by a bug description, treat as incident intake. If intent is SLA report, use /report sla rule."
    allowed_roles: [customer, support_staff, engineer, team_lead, manager, admin]
    allowed_contexts: [group_chat, direct_message]
    effect: "incident_intake"
    requires_confirmation: false
    audit: true

  - name: "/status"
    parameters: ["jira_issue_key"]
    description: "View incident status."
    allowed_roles: [customer, support_staff, engineer, team_lead, manager, admin]
    allowed_contexts: [group_chat, direct_message]
    access_condition: "customer can view incidents linked to their chat; internal roles can view incidents in their assigned project scope"
    effect: "read_incident_status"
    requires_confirmation: false
    audit: false

  - name: "/report sla"
    description: "View current SLA report."
    allowed_roles: [support_staff, manager]
    optional_roles_by_org_policy: [team_lead]
    allowed_contexts: [group_chat, direct_message, admin_console]
    access_condition: "actor must belong to the support organization or configured project scope"
    effect: "read_sla_report"
    requires_confirmation: false
    audit: true

  - name: "/suggest"
    parameters: ["jira_issue_key"]
    description: "Suggest up to 3 engineers for an incident."
    allowed_roles: [team_lead, manager]
    allowed_contexts: [group_chat, direct_message, admin_console]
    access_condition: "actor must manage the target project or support queue"
    effect: "resource_suggestion"
    requires_confirmation: false
    audit: true

  - name: "/reassign"
    parameters: ["jira_issue_key"]
    description: "Request reassignment suggestion or confirm reassignment. Final assignment requires human approval."
    allowed_roles: [team_lead, manager]
    allowed_contexts: [group_chat, direct_message, admin_console]
    access_condition: "actor must manage the target project or support queue"
    effect: "human_approved_assignment_change"
    requires_confirmation: true
    audit: true

  - name: "/incidents"
    description: "List open incidents."
    allowed_roles: [support_staff, manager]
    optional_roles_by_org_policy: [team_lead]
    allowed_contexts: [group_chat, direct_message, admin_console]
    access_condition: "actor must belong to the support organization or configured project scope"
    effect: "read_open_incidents"
    requires_confirmation: false
    audit: false

  - name: "/config"
    description: "View or change system configuration."
    allowed_roles: [admin]
    allowed_contexts: [admin_console, direct_message]
    access_condition: "actor must pass admin authentication and any configured MFA/session checks"
    effect: "read_or_write_config"
    requires_confirmation: true
    audit: true

automated_actions:
  - id: "classify_message"
    performer: "aia_bot"
    allowed: true
    allowed_when:
      - "webhook signature is valid"
      - "message is text or supported attachment metadata"
    audit: true

  - id: "ask_bug_confirmation"
    performer: "aia_bot"
    allowed: true
    allowed_when:
      - "bug_probability is below threshold but message is ambiguous"
    audit: true

  - id: "create_jira_issue"
    performer: "aia_bot"
    allowed: true
    allowed_when:
      - "bug_probability >= configured bug threshold, default 0.70, or user explicitly confirms"
      - "no duplicate incident found above configured duplicate threshold"
      - "Jira connection is healthy"
      - "message_id has not already been processed into another Jira issue"
    forbidden_when:
      - "webhook is unauthenticated"
      - "message is classified as non-bug"
      - "actor attempts to override Jira project config without admin permission"
    audit: true

  - id: "update_duplicate_jira_issue"
    performer: "aia_bot"
    allowed: true
    allowed_when:
      - "semantic_similarity >= configured duplicate threshold, default 0.80"
      - "target Jira issue status is Open or In Progress"
      - "message_id is not already linked to the target issue"
    audit: true

  - id: "send_sla_warning"
    performer: "aia_bot"
    allowed: true
    allowed_when:
      - "incident is open"
      - "20 percent of SLA time remains"
      - "first response has not been detected"
    audit: true

  - id: "escalate_sla_breach"
    performer: "aia_bot"
    allowed: true
    allowed_when:
      - "incident breached SLA"
      - "first response has not been detected"
    escalation_order:
      - "direct reminder to responsible person if available"
      - "public group chat warning after 100 percent SLA"
      - "Team Lead alert after 150 percent SLA"
    audit: true

  - id: "suggest_engineers"
    performer: "aia_bot"
    allowed: true
    allowed_when:
      - "requested by Team Lead or Manager using /suggest or /reassign"
      - "all assigned engineers are busy with incidents severity High or Critical"
      - "Critical incident is unassigned for at least 5 minutes"
    output_limit: 3
    audit: true

  - id: "assign_or_reassign_engineer"
    performer: "aia_bot"
    allowed: false
    human_required_roles: [team_lead, manager]
    reason: "SRS FR-F6-04 forbids automatic assignment. AI may only suggest."
    audit: true

  - id: "change_system_config"
    performer: "aia_bot"
    allowed: false
    human_required_roles: [admin]
    reason: "Configuration changes require Admin authorization and confirmation."
    audit: true

data_access:
  customer:
    can_read:
      - "acknowledgement for their submitted incident"
      - "Jira issue key linked to their chat"
      - "severity and expected SLA response time"
      - "public status updates for incidents linked to their chat"
    cannot_read:
      - "raw internal audit logs"
      - "all-company SLA reports"
      - "engineer workload data"
      - "system configuration"

  support_staff:
    can_read:
      - "open incidents in assigned support scope"
      - "SLA warnings and SLA reports in support scope"
      - "customer-facing incident details"
    can_write:
      - "support response messages"
      - "manual confirmation or rejection notes"
    cannot_write:
      - "system configuration"
      - "automatic engineer assignment"

  engineer:
    can_read:
      - "incidents assigned to them or visible in their project scope"
      - "technical details required for investigation"
    can_write:
      - "Jira status and technical comments if Jira permission allows"
    cannot_read:
      - "global SLA reports unless also support/manager"
      - "admin configuration"

  team_lead:
    can_read:
      - "resource suggestions"
      - "team workload summary"
      - "SLA escalations for managed scope"
    can_write:
      - "approval for assignment or reassignment"
    cannot_write:
      - "system configuration unless also admin"

  manager:
    can_read:
      - "SLA reports"
      - "open incident summaries"
      - "resource suggestions"
    can_write:
      - "approval for assignment or reassignment"
    cannot_write:
      - "system configuration unless also admin"

  admin:
    can_read:
      - "system configuration"
      - "integration health"
      - "audit logs according to privacy policy"
    can_write:
      - "Jira connection config"
      - "LLM provider config"
      - "thresholds and mappings"

retention:
  raw_message_content_days: 30
  after_raw_retention_keep:
    - "metadata"
    - "structured incident data"
    - "audit events"
  secrets_storage:
    encryption: "AES-256"
    hard_code_allowed: false

